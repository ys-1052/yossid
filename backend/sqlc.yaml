version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/"
    queries: "sql/queries/"
    gen:
      go:
        package: "db"
        out: "internal/storage/postgres/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
