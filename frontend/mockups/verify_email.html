<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yossid — Verify Email (Neo-Brutalist)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --card-bg: #ffffff;
      --text-main: #111111;
      --text-muted: #666666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border-color: #111111;
      --input-bg: #ffffff;
      --shadow-offset: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: var(--card-bg);
      border: 4px solid var(--border-color);
      border-radius: 0px;
      padding: 40px 32px;
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
      position: relative;
    }

    .meta-tag {
      position: absolute;
      top: -16px;
      left: 20px;
      background: var(--text-main);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border: 2px solid var(--border-color);
    }

    .header {
      margin-bottom: 24px;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1.5px;
      text-transform: lowercase;
      margin-bottom: 6px;
      display: inline-block;
      border-bottom: 4px solid var(--accent);
      padding-bottom: 2px;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .description {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 28px;
      background: #f0fdf4;
      border: 2px dashed #16a34a;
      padding: 16px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 3px solid var(--border-color);
      border-radius: 0px;
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: transform 0.1s ease;
    }

    input:focus {
      background: #fbfbfb;
      box-shadow: 3px 3px 0px var(--accent);
      transform: translate(-1px, -1px);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #ffffff;
      border: 3px solid var(--border-color);
      border-radius: 0px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--border-color);
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }

    .submit-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--border-color);
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      border-top: 2px dashed var(--border-color);
      padding-top: 20px;
    }

    .footer a {
      color: var(--accent);
      text-decoration: underline;
      font-weight: 700;
    }

    .footer a:hover {
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="meta-tag">STATUS: PENDING_VERIFICATION</div>
      
      <div class="header">
        <div class="logo">yossid</div>
        <div class="subtitle">> EMAIL_VERIFICATION_REQUIRED</div>
      </div>

      <div class="description">
        We sent a verification link to your email address. Please check your inbox and click the link to confirm your account.<br><br>
        Alternatively, copy the verification token from the email and paste it below.
      </div>

      <form id="verifyForm" method="POST" action="/email/verify">
        <div class="form-group">
          <div class="label-row">
            <label for="token">VERIFICATION_TOKEN</label>
          </div>
          <input 
            type="text" 
            id="token" 
            name="token" 
            placeholder="Paste token here" 
            required
            autocomplete="off"
            enterkeyhint="done"
          >
        </div>

        <button type="submit" class="submit-btn">VERIFY_TOKEN</button>
      </form>

      <div class="footer">
        Didn't receive email? <a href="/email/resend">RESEND_EMAIL</a>
      </div>
    </div>
  </div>
</body>
</html>
