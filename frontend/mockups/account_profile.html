<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yossid — Personal Info (Neo-Brutalist)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --card-bg: #ffffff;
      --text-main: #111111;
      --text-muted: #666666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #ef4444;
      --border-color: #111111;
      --shadow-offset: 5px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--card-bg);
      border-bottom: 4px solid var(--border-color);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--text-main);
      border-bottom: 3px solid var(--accent);
    }

    .logout-btn {
      padding: 8px 14px;
      background: var(--danger);
      color: #fff;
      border: 2px solid var(--border-color);
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px var(--border-color);
      transition: all 0.1s ease;
    }

    .logout-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--border-color);
    }

    /* Layout Wrapper */
    .layout-wrapper {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 1000px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .layout-wrapper {
        grid-template-columns: 240px 1fr;
      }
    }

    /* Sidebar Navigation */
    .sidebar {
      display: flex;
      flex-direction: row;
      gap: 12px;
      border-bottom: 4px solid var(--border-color);
      padding-bottom: 20px;
      height: fit-content;
    }

    @media (min-width: 768px) {
      .sidebar {
        flex-direction: column;
        border-bottom: none;
        border-right: 4px dashed var(--border-color);
        padding-bottom: 0;
        padding-right: 24px;
      }
    }

    .nav-item {
      display: block;
      padding: 12px 16px;
      border: 3px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.5px;
      box-shadow: 3px 3px 0px var(--border-color);
      transition: all 0.1s ease;
      font-family: 'JetBrains Mono', monospace;
      width: 100%;
      text-align: center;
    }

    @media (min-width: 768px) {
      .nav-item {
        text-align: left;
      }
    }

    .nav-item:hover, .nav-item.active {
      background: var(--accent);
      color: #fff;
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0px var(--border-color);
    }

    /* Content Area */
    .content-area {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .card {
      background: var(--card-bg);
      border: 4px solid var(--border-color);
      padding: 32px;
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
      position: relative;
    }

    .meta-tag {
      position: absolute;
      top: -16px;
      left: 20px;
      background: var(--text-main);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border: 2px solid var(--border-color);
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 3px solid var(--border-color);
      border-radius: 0px;
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: transform 0.1s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px;
      padding-right: 40px;
    }

    input:focus, select:focus {
      background: #ffffff;
      box-shadow: 3px 3px 0px var(--accent);
      transform: translate(-1px, -1px);
    }

    .submit-btn {
      padding: 14px 28px;
      background: var(--accent);
      color: #ffffff;
      border: 3px solid var(--border-color);
      border-radius: 0px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 3px 3px 0px var(--border-color);
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0px var(--border-color);
    }

    .submit-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px var(--border-color);
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <header class="top-nav">
    <a href="/account" class="logo">yossid</a>
    <form action="/logout" method="POST">
      <button type="submit" class="logout-btn">Sign Out</button>
    </form>
  </header>

  <!-- Main Wrapper -->
  <div class="layout-wrapper">
    <!-- Sidebar -->
    <nav class="sidebar">
      <a href="account_home.html" class="nav-item">Home</a>
      <a href="account_profile.html" class="nav-item active">Personal Info</a>
      <a href="account_security.html" class="nav-item">Security</a>
    </nav>

    <!-- Content -->
    <main class="content-area">
      <section class="card">
        <div class="meta-tag">PROFILE_DETAILS</div>
        <h2 class="card-title">Personal Info</h2>
        
        <form id="profileForm" method="POST" action="/account/profile">
          <div class="form-group">
            <div class="label-row">
              <label for="email">Email Address</label>
            </div>
            <input 
              type="email" 
              id="email" 
              name="email" 
              value="jane.doe@example.com" 
              required
              disabled
              style="opacity: 0.6; cursor: not-allowed;"
            >
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px;">
              * Email address cannot be changed.
            </div>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="fullname">Full Name</label>
            </div>
            <input 
              type="text" 
              id="fullname" 
              name="fullname" 
              value="Jane Doe" 
              required
            >
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="katakana">Katakana Name</label>
            </div>
            <input 
              type="text" 
              id="katakana" 
              name="katakana" 
              value="ジェーン ドゥ" 
              required
              pattern="^[ァ-ヶー\s]+$"
            >
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="birthdate">Birthdate</label>
            </div>
            <input 
              type="date" 
              id="birthdate" 
              name="birthdate" 
              value="1995-04-15" 
              required
            >
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="gender">Gender</label>
            </div>
            <select id="gender" name="gender" required>
              <option value="male">Male</option>
              <option value="female" selected>Female</option>
              <option value="other">Other</option>
              <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
          </div>

          <button type="submit" class="submit-btn">Save Changes</button>
        </form>
      </section>
    </main>
  </div>

</body>
</html>
