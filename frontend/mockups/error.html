<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yossid — Error (Neo-Brutalist)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --card-bg: #ffffff;
      --text-main: #111111;
      --text-muted: #666666;
      --accent: #ef4444; /* Alert Red */
      --accent-hover: #dc2626;
      --border-color: #111111;
      --shadow-offset: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: var(--card-bg);
      border: 4px solid var(--border-color);
      border-radius: 0px;
      padding: 40px 32px;
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
      position: relative;
    }

    .meta-tag {
      position: absolute;
      top: -16px;
      left: 20px;
      background: var(--accent);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border: 2px solid var(--border-color);
    }

    .header {
      margin-bottom: 24px;
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 16px;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1.5px;
      text-transform: lowercase;
      margin-bottom: 6px;
      display: inline-block;
      border-bottom: 4px solid var(--accent);
      padding-bottom: 2px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 8px;
    }

    .error-console {
      background: #fafafa;
      border: 3px solid var(--border-color);
      padding: 20px;
      margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
    }

    .console-line {
      display: block;
      margin-bottom: 8px;
    }

    .console-line:last-child {
      margin-bottom: 0;
    }

    .label-err {
      color: var(--accent);
      font-weight: 700;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--text-main);
      color: #ffffff;
      border: 3px solid var(--border-color);
      border-radius: 0px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--border-color);
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      background: #333333;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }

    .submit-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--border-color);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="meta-tag">SYSTEM_ALERT_F44</div>
      
      <div class="header">
        <div class="logo">yossid</div>
        <h1 class="title">> OIDC PROTOCOL ERROR</h1>
      </div>

      <div class="error-console">
        <span class="console-line"><span class="label-err">STATUS_CODE:</span> 400 Bad Request</span>
        <span class="console-line"><span class="label-err">ERROR:</span> invalid_request</span>
        <span class="console-line"><span class="label-err">DESCRIPTION:</span> The request is missing a required parameter, includes an invalid parameter value, includes a parameter more than once, or is otherwise malformed.</span>
        <span class="console-line"><span class="label-err">MISSING_PARAM:</span> redirect_uri</span>
      </div>

      <button type="button" class="submit-btn" onclick="history.back()">RETURN_TO_SAFETY</button>
    </div>
  </div>
</body>
</html>
